<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildAI Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#16a34a">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>

<!-- ─── Admin Login ───────────────────────────────────────────────────────── -->
<div id="admin-login" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">⚙️ ADMIN<strong>PANEL</strong></div>
    <div class="auth-form">
      <div class="form-group">
        <label>Password de Admin</label>
        <input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') AdminAuth.login()">
      </div>
      <div id="admin-error" class="auth-error"></div>
      <button class="btn-auth" onclick="AdminAuth.login()">Entrar</button>
    </div>
  </div>
</div>

<!-- ─── Admin App ─────────────────────────────────────────────────────────── -->
<div id="admin-app" class="app-screen hidden">

  <aside class="sidebar">
    <div class="sidebar-logo">⚙️ ADMIN<strong>PANEL</strong></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" onclick="Admin.goto('overview')" data-page="overview"><span>📊</span> Visão Geral</a>
      <a class="nav-item" onclick="Admin.goto('users')" data-page="users"><span>👥</span> Utilizadores</a>
      <a class="nav-item" onclick="Admin.goto('projects')" data-page="projects"><span>📋</span> Todos os Projetos</a>
      <a class="nav-item" onclick="Admin.goto('invoices')" data-page="invoices"><span>🧾</span> Todas as Faturas</a>
      <a class="nav-item" onclick="Admin.goto('revenue')" data-page="revenue"><span>💶</span> Receita</a>
    </nav>
    <div class="sidebar-footer">
      <div class="plan-badge-sidebar" style="background:rgba(234,179,8,0.15);color:#eab308">ADMIN</div>
      <button class="btn-logout" onclick="AdminAuth.logout()">Sair</button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="app-header">
      <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
      <h1 id="admin-page-title">Visão Geral</h1>
      <div class="app-header-right">
        <span style="font-size:0.8rem;color:var(--text2)">Admin</span>
        <div class="avatar" style="background:linear-gradient(135deg,#eab308,#f97316)">A</div>
      </div>
    </header>
    <main id="admin-main" class="app-main"></main>
  </div>
</div>

<!-- ─── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/db.js"></script>
<script src="admin.js"></script>
</body>
</html>
